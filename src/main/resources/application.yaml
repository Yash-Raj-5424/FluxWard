spring:
  application:
    name: FluxWard
  data:
    redis:
      host: localhost
      port: 6379

  rate-limiter:
    capacity: 3
    refill-rate-per-second: 1
    window-ms: 60000
    fail-open: true
    key-type: API_KEY

  management:
    endpoints:
      web:
        exposure:
          include: health, prometheus
    metrics:
      export:
        prometheus:
          enabled: true
